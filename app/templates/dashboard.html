{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    
    <!-- Stats Cards -->
    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-orange-500">
        <h3 class="text-xl font-bold text-gray-700">Total Devices</h3>
        <p class="text-4xl font-bold text-orange-600 mt-2">0</p>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-green-500">
        <h3 class="text-xl font-bold text-gray-700">Successful Backups</h3>
        <p class="text-4xl font-bold text-green-600 mt-2">0</p>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-red-500">
        <h3 class="text-xl font-bold text-gray-700">Failed Backups</h3>
        <p class="text-4xl font-bold text-red-600 mt-2">0</p>
    </div>

</div>

<div class="mt-8 flex gap-6">
    <div class="w-full md:w-2/3 bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Recent Activity</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200 text-gray-700">
                        <th class="p-3">Time</th>
                        <th class="p-3">Device</th>
                        <th class="p-3">Status</th>
                        <th class="p-3">Message</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="p-3 text-center text-gray-500">No recent activity</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="w-full md:w-1/3 bg-white p-6 rounded-lg shadow-md">
         <h2 class="text-2xl font-bold text-gray-800 mb-4">Quick Actions</h2>
         <div class="flex flex-col space-y-3">
             <button class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded w-full">
                 Trigger All Backups
             </button>
             <a href="/devices/new" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded w-full text-center">
                 Add Device
             </a>
         </div>
    </div>
</div>
{% endblock %}
